input {
  file {
    path => "/home/*/ioc-data/realtime_ioc_events.json"
    start_position => "end"
    codec => "json"
  }
}

filter {
  date {
    match => [ "timestamp", "ISO8601" ]
  }
  
  mutate {
    add_field => { 
      "correlation_id" => "%{ioc_type}_%{ioc_value}"
      "data_source" => "realtime"
    }
  }
}

output {
  elasticsearch {
    hosts => ["localhost:9200"]
    index => "ioc-events-%{+YYYY.MM.dd}"
  }
}
