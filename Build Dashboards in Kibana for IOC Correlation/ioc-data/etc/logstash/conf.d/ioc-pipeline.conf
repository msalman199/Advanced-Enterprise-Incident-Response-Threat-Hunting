input {
  file {
    path => "/home/*/ioc-data/ioc_events.json"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    codec => "json"
  }
}

filter {
  date {
    match => [ "timestamp", "ISO8601" ]
  }
  
  mutate {
    add_field => { "correlation_id" => "%{ioc_type}_%{ioc_value}" }
  }
}

output {
  elasticsearch {
    hosts => ["localhost:9200"]
    index => "ioc-events-%{+YYYY.MM.dd}"
  }
}
