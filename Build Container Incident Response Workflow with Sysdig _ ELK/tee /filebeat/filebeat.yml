filebeat.inputs:
- type: log
  enabled: true
  paths:
    - /var/log/falco/events.log
  json.keys_under_root: true
  json.add_error_key: true
  fields:
    log_type: falco
    environment: lab

- type: container
  enabled: true
  paths:
    - '/var/lib/docker/containers/*/*.log'
  fields:
    log_type: container
    environment: lab

processors:
- add_docker_metadata:
    host: "unix:///var/run/docker.sock"

output.logstash:
  hosts: ["logstash:5044"]

logging.level: info
logging.to_files: true
logging.files:
  path: /var/log/filebeat
  name: filebeat
  keepfiles: 7
  permissions: 0644
