input {
  beats {
    port => 5044
  }
  file {
    path => "/var/log/falco/events.log"
    start_position => "beginning"
    codec => "json"
    tags => ["falco"]
  }
}

filter {
  if "falco" in [tags] {
    mutate {
      add_field => { "event_type" => "security" }
    }
    
    if [priority] {
      mutate {
        add_field => { "severity" => "%{priority}" }
      }
    }
    
    if [rule] {
      mutate {
        add_field => { "security_rule" => "%{rule}" }
      }
    }
    
    date {
      match => [ "time", "ISO8601" ]
      target => "@timestamp"
    }
  }
  
  if [fields][container_name] {
    mutate {
      add_field => { "container_info" => "%{[fields][container_name]}" }
    }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "container-security-%{+YYYY.MM.dd}"
  }
  
  stdout {
    codec => rubydebug
  }
}
